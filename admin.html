<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="文章管理 - 高俊杰的赛博朋克博客">
    <title>文章管理 - 高俊杰的赛博朋克博客</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .admin-container {
            max-width: 900px;
            margin: 100px auto;
            padding: 40px 20px;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .admin-header h1 {
            font-size: 36px;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--primary-color);
            padding-bottom: 10px;
        }
        
        .admin-tab {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--border-color);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .admin-tab.active {
            background: var(--primary-color);
            color: var(--bg-dark);
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-color);
        }
        
        .admin-tab:hover:not(.active) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        
        .admin-form {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .admin-form .form-group {
            margin-bottom: 25px;
        }
        
        .admin-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .admin-form input,
        .admin-form select,
        .admin-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: var(--transition);
            font-family: 'Courier New', monospace;
            background: var(--bg-dark);
            color: var(--text-color);
        }
        
        .admin-form input:focus,
        .admin-form select:focus,
        .admin-form textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        .admin-form textarea {
            min-height: 300px;
            resize: vertical;
        }
        
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-dark);
            min-height: 50px;
        }
        
        .tag-item {
            background: var(--primary-color);
            color: var(--bg-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
        }
        
        .tag-item button {
            background: none;
            border: none;
            color: var(--bg-dark);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
        }
        
        .tag-input {
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 14px;
            flex: 1;
            min-width: 100px;
        }
        
        .tag-input:focus {
            outline: none;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-submit {
            flex: 1;
            padding: 14px 28px;
            background: var(--primary-color);
            color: var(--bg-dark);
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn-submit:hover {
            background: transparent;
            color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-color);
        }
        
        .btn-cancel {
            padding: 14px 28px;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-cancel:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        
        .posts-list {
            background: var(--bg-card);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        
        .post-item {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }
        
        .post-item:hover {
            background: rgba(0, 255, 255, 0.05);
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-item-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: var(--primary-color);
        }
        
        .post-item-meta {
            font-size: 14px;
            color: #999;
        }
        
        .post-item-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-edit, .btn-delete {
            padding: 8px 16px;
            border: 1px solid;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            font-weight: 600;
        }
        
        .btn-edit {
            background: transparent;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-edit:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
        }
        
        .btn-delete {
            background: transparent;
            color: var(--neon-pink);
            border-color: var(--neon-pink);
        }
        
        .btn-delete:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-color);
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .admin-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html">高俊杰的博客</a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="blog.html">博客</a></li>
                <li><a href="admin.html" class="active">管理</a></li>
            </ul>
            <button class="menu-toggle" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h1>📝 文章管理</h1>
            <p style="color: var(--text-color);">创建和管理您的博客文章</p>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="create">创建文章</button>
            <button class="admin-tab" data-tab="list">文章列表</button>
        </div>

        <div id="create-tab" class="tab-content">
            <form class="admin-form" id="article-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">文章标题 *</label>
                        <input type="text" id="title" name="title" required placeholder="输入文章标题">
                    </div>
                    <div class="form-group">
                        <label for="category">分类 *</label>
                        <select id="category" name="category" required>
                            <option value="">选择分类</option>
                            <option value="技术">技术</option>
                            <option value="生活">生活</option>
                            <option value="学习">学习</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tags">标签</label>
                    <div class="tag-input-container" id="tag-container">
                        <input type="text" class="tag-input" id="tag-input" placeholder="输入标签后按回车添加">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="excerpt">文章摘要 *</label>
                        <input type="text" id="excerpt" name="excerpt" required placeholder="简要描述文章内容">
                    </div>
                    <div class="form-group">
                        <label for="cover">封面图片URL</label>
                        <input type="url" id="cover" name="cover" placeholder="https://example.com/image.jpg">
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">文章内容 (Markdown格式) *</label>
                    <textarea id="content" name="content" required placeholder="使用Markdown语法编写文章内容..."></textarea>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn-cancel" onclick="resetForm()">重置</button>
                    <button type="submit" class="btn-submit">💾 保存文章</button>
                </div>
            </form>
        </div>

        <div id="list-tab" class="tab-content" style="display: none;">
            <div class="posts-list" id="posts-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📄</div>
                    <p>暂无文章</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 高俊杰的赛博朋克博客. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
