    <link rel="stylesheet" href="css/animations.css">
</head>

    <main>
        <section class="hero" style="padding: 60px 20px;">
            <div class="container">
                <h1>博客文章</h1>
                <p>探索技术、分享思考、记录成长</p>
            </div>
        </section>

        <section class="blog-section">
            <div class="container">
                <div class="blog-filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="tech">技术</button>
                    <button class="filter-btn" data-filter="life">生活</button>
                    <button class="filter-btn" data-filter="study">学习</button>
                </div>

                <div class="posts-grid">
                            <article class="blog-post-item" data-category="tech">
            <div class="post-thumbnail">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800" alt="欢迎来到我的博客">
            </div>
            <div class="post-info">
                <span class="post-category">技术</span>
                <h2><a href="posts/欢迎来到我的博客.html">欢迎来到我的博客</a></h2>

                <div class="post-meta">
                    <span class="post-date">2026-03-06</span>
                    <span class="post-reading-time">3分钟阅读</span>
                </div>
            </div>
        </article>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>高俊杰的博客</h3>
                    <p>赛博朋克风格个人博客</p>
                </div>
                <div class="footer-section">
                    <h3>快速链接</h3>
                    <ul>

                    <h3>联系方式</h3>
                    <p>Email: 3427497074@qq.com</p>

                <p>&copy; 2026 高俊杰的赛博朋克博客. All rights reserved.</p>

    <button class="floating-add-btn" id="floating-add-btn" title="新建文章">
        <span class="plus-icon">+</span>
        <span class="btn-text">新建</span>
    </button>

    <div class="post-modal" id="post-modal">
        <div class="post-modal-content">
            <div class="post-modal-header">
                <h2>📝 添加新文章</h2>
                <button class="close-modal" id="close-modal">&times;</button>
            </div>
            <div class="post-modal-body">
                <form id="article-form">
                    <div class="form-group">
                        <label for="title">文章标题 *</label>
                        <input type="text" id="title" name="title" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">分类 *</label>
                            <select id="category" name="category" required>
                                <option value="">选择分类</option>
                                <option value="技术">技术</option>
                                <option value="生活">生活</option>
                                <option value="学习">学习</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="tags">标签</label>
                            <input type="text" id="tags" name="tags" placeholder="用逗号分隔">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="excerpt">文章摘要 *</label>
                        <input type="text" id="excerpt" name="excerpt" required>
                    </div>
                    <div class="form-group">
                        <label for="cover">封面图片</label>
                        <div class="cover-upload">
                            <input type="text" id="cover" name="cover" placeholder="图片URL或上传">
                            <button type="button" id="upload-cover-btn" class="upload-btn">上传</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="content">文章内容 (Markdown) *</label>
                        <textarea id="content" name="content" rows="10" required></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" id="cancel-btn">取消</button>
                        <button type="submit" class="btn-submit">💾 保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/blog-loader.js"></script>
    <script src="js/blog.js"></script>
    <script src="js/post-editor.js"></script>
</body>
</html>
